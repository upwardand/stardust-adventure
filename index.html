// =====================================================================
//  输入
// =====================================================================
const keys = {};
let jumpBufT = 0, anyKeyPressed = false;
addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.repeat) return;
  keys[e.key.toLowerCase()] = true;
  anyKeyPressed = true;
  if (['w','arrowup',' '].includes(e.key.toLowerCase())) jumpBufT = JUMP_BUF;
  if (e.key.toLowerCase() === 'm') sfx.muted = !sfx.muted;
  if (e.key.toLowerCase() === 'p' || e.key === 'Escape') if (state === 'play') state = 'pause'; else if (state === 'pause') state = 'play';
  if (e.key.toLowerCase() === 'r') { if (state === 'play' || state === 'pause' || state === 'over') retryLevel(); if (state === 'win') { totalScore = 0; bootsT = 0; gemsRun = 0; loadLevel(0); state = 'play'; } }
  if (/^[0-9]$/.test(e.key) && (state==='play'||state==='pause')) { const idx = e.key === '0' ? 9 : +e.key - 1; if (idx < LEVELS.length) { totalScore = 0; bootsT = 0; gemsRun = 0; loadLevel(idx); state = 'play'; } }
  sfx.resume();
});
addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
const left  = () => keys['a'] || keys['arrowleft'];
const right = () => keys['d'] || keys['arrowright'];
const jumpHeld = () => keys['w'] || keys['arrowup'] || keys[' '];

// =====================================================================
//  音效 + 背景音乐（WebAudio 合成，无外部文件）
// =====================================================================
const sfx = {
  ctx: null, muted: false, musicTimer: null, step: 0,
  resume() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.startMusic();
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  beep(f0, f1, dur, type = 'square', vol = 0.12, delay = 0) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  },
  jump()   { this.beep(300, 620, 0.14, 'square', 0.09); },
  coin()   { this.beep(988, 988, 0.06, 'square', 0.09); this.beep(1319, 1319, 0.16, 'square', 0.09, 0.06); },
  stomp()  { this.beep(400, 90, 0.18, 'square', 0.14); },
  hurt()   { this.beep(280, 60, 0.3, 'sawtooth', 0.14); },
  spring() { this.beep(200, 900, 0.25, 'square', 0.11); },
  heart()  { this.beep(523, 523, 0.09, 'sine', 0.12); this.beep(784, 784, 0.2, 'sine', 0.12, 0.09); },
  flag()   { [523,659,784].forEach((f,i)=>this.beep(f,f,0.12,'square',0.1,i*0.09)); },
  win()    { [523,659,784,1047,784,1047].forEach((f,i)=>this.beep(f,f,0.14,'square',0.11,i*0.11)); },
  die()    { this.beep(400, 50, 0.5, 'sawtooth', 0.13); },
  crumble(){ this.beep(180, 60, 0.15, 'sawtooth', 0.07); },
  shoot()  { this.beep(700, 200, 0.12, 'sawtooth', 0.06); },
  gem()    { [784,1175,1568].forEach((f,i)=>this.beep(f,f,0.1,'sine',0.11,i*0.07)); },
  star()   { [523,659,784,1047,1319].forEach((f,i)=>this.beep(f,f,0.09,'square',0.1,i*0.07)); },
  boots()  { [392,523,659,784].forEach((f,i)=>this.beep(f,f,0.11,'triangle',0.12,i*0.08)); },
  bossHit(){ this.beep(220, 80, 0.25, 'sawtooth', 0.16); },
  bossDie(){ [392,330,262,196,262,392,523].forEach((f,i)=>this.beep(f,f,0.16,'square',0.12,i*0.12)); },
  // 简易 16 步双轨循环
  startMusic() {
    const N = n => 440 * Math.pow(2, n / 12); // n 相对 A4 的半音数
    const mel = [ -5,null,0,null, 2,null,0,-5, -7,null,-5,null, -9,null,-7,null,
                  -5,null,0,null, 3,null,2,0,  -2,null,0,null,  -5,null,null,null ];
    const bas = [ -29,null,null,null, -26,null,null,null, -31,null,null,null, -24,null,null,-26,
                  -29,null,null,null, -26,null,null,null, -31,null,-31,null,  -29,null,null,null ];
    const stepDur = 0.145;
    this.musicTimer = setInterval(() => {
      if (!this.ctx || this.muted || state === 'title') return;
      const i = this.step % mel.length;
      const tr = [0, -4, 3, 7, -2, 5, 1, -5, 8, 10][level % 10];   // 每关移调
      if (mel[i] !== null) this.beep(N(mel[i]+tr), N(mel[i]+tr), 0.13, 'triangle', 0.045);
      if (bas[i] !== null) this.beep(N(bas[i]+tr), N(bas[i]+tr), 0.13, 'square', 0.028);
      this.step++;
    }, stepDur * 1000);
  },
};

let level = 0;

let bullets, gems, stars, bootsItems, gates, boss;
let particles = [], popups = [];

let levelTime = 0, totalScore = 0, levelScore = 0, coinCount = 0, stompCount = 0;
let bootsT = 0, gemsRun = 0;   // bootsT: 二段跳剩余秒数
let hintT = 7;         // 第一关操作提示显示时长
let shakeT = 0;
let clearStats = null;

const T_EMPTY=0, T_SOLID=1, T_ONEWAY=2, T_SPIKE=3, T_LAVA=4, T_CRUMBLE=5, T_ICE=6;
const isSolidT = t => t === T_SOLID || t === T_ICE;
const getBest = () => { try { return +(localStorage.getItem('stardust_best') || 0); } catch(e) { return 0; } };
const saveBest = v => { try { if (v > getBest()) localStorage.setItem('stardust_best', v); } catch(e) {} };

function loadLevel(idx) {
  level = idx;
  const L = LEVELS[idx];
  const rows = L.map;
  gridW = Math.max(...rows.map(r => r.length));
  gridH = rows.length;
  grid = [];
  enemies = []; coins = []; hearts = []; springs = []; checkpoints = []; movers = [];
  bullets = []; gems = []; stars = []; bootsItems = []; gates = []; boss = null;
  crumbleState = new Map();
  goal = null;
  particles = []; popups = [];
  let spawn = { x: TILE * 2, y: 0 };

  for (let y = 0; y < gridH; y++) {
    const row = (rows[y] || '').padEnd(gridW, ' ');
    grid[y] = new Uint8Array(gridW);
    for (let x = 0; x < gridW; x++) {
      const c = row[x], px = x * TILE, py = y * TILE;
      switch (c) {
        case '#': grid[y][x] = T_SOLID; break;
        case 'I': grid[y][x] = T_ICE; break;
        case 'W': grid[y][x] = T_SOLID; gates.push({tx:x, ty:y}); break;
        case '=': grid[y][x] = T_ONEWAY; break;
        case '^': grid[y][x] = T_SPIKE; break;
        case '~': grid[y][x] = T_LAVA; break;
        case 'C': grid[y][x] = T_CRUMBLE; crumbleState.set(x+','+y, {t:-1, gone:false, regen:0}); break;
        case 'o': coins.push({x:px+16, y:py+16, taken:false, t:Math.random()*6}); break;
        case '+': hearts.push({x:px+16, y:py+16, taken:false, t:Math.random()*6}); break;
        case '$': gems.push({x:px+16, y:py+16, taken:false, t:Math.random()*6}); break;
        case '!': stars.push({x:px+16, y:py+16, taken:false, t:Math.random()*6}); break;
        case 'B': bootsItems.push({x:px+16, y:py+16, taken:false, t:Math.random()*6}); break;
        case 'S': springs.push({x:px, y:py+16, w:TILE, h:16, anim:0}); break;
        case '*': checkpoints.push({x:px+16, y:py, active:false}); break;
        case 'P': spawn = {x:px+5, y:py}; break;
        case 'G': goal = {x:px+16, y:py+TILE}; break;
        case 'E': enemies.push(mkEnemy('walker', px, py)); break;
        case 'K': enemies.push(mkEnemy('spiky', px, py)); break;
        case 'F': enemies.push(mkEnemy('flyer', px, py)); break;
        case 'T': enemies.push(mkEnemy('turret', px, py)); break;
        case 'J': enemies.push(mkEnemy('hopper', px, py)); break;
        case 'X': boss = mkBoss(px, py); break;
        case 'M': movers.push({x:px-TILE, y:py, w:TILE*3, h:14, ox:px-TILE, oy:py, axis:'x', amp:TILE*3, t:Math.random()*6, dx:0, dy:0}); break;
        case 'N': movers.push({x:px-TILE, y:py, w:TILE*3, h:14, ox:px-TILE, oy:py, axis:'y', amp:TILE*2.5, t:Math.random()*6, dx:0, dy:0}); break;
      }
    }
  }
  if (!goal) goal = {x:(gridW-3)*TILE, y:(gridH-3)*TILE};
  respawn = {...spawn};
  player = mkPlayer(spawn.x, spawn.y);
  camX = Math.max(0, player.x - W * 0.38); camY = 0;
  levelTime = 0; levelScore = 0; coinCount = 0; stompCount = 0;
  if (idx === 0) hintT = 7;
}

function mkPlayer(x, y) {
  return { x, y, w:22, h:28, vx:0, vy:0, face:1,
    onGround:false, coyoteT:0, hp:3, invulnT:0, squash:0, runT:0,
    standMover:null, prevBottom:y+28, dead:false, airJumps:1, starT:0 };
}
function mkEnemy(kind, px, py) {
  const base = { kind, dir:-1, dead:false, deadT:0, t:Math.random()*6 };
  if (kind === 'walker') return {...base, x:px+3, y:py+TILE-22, w:26, h:22, spd:46};
  if (kind === 'spiky')  return {...base, x:px+3, y:py+TILE-24, w:26, h:24, spd:34};
  if (kind === 'turret') return {...base, x:px+3, y:py+TILE-20, w:26, h:20, spd:0, cool:1.5};
  if (kind === 'hopper') return {...base, x:px+4, y:py+TILE-20, w:24, h:20, spd:0, wait:0.8, vx:0, vy:0};
  return {...base, x:px+2, y:py, w:28, h:20, oy:py, spd:0};   // flyer 上下浮动
}
function mkBoss(px, py) {
  const cfg = LEVELS[level] || {};
  const hp = cfg.bossHp || 6;
  return { x:px-34, y:py, w:100, h:74, vx:0, vy:0, hp, maxHp:hp,
    active:false, stunT:0, pauseT:1.2, hops:0, dead:false, t:0, dir:-1,
    onGround:false, prevBottom:py+74, minionT:cfg.bossMinionT || 8, squish:0,
    arenaL: px - 13*TILE, arenaR: px + 12*TILE };
}

function retryLevel() {
  // 从检查点复活，保留已收集金币与总分
  player = mkPlayer(respawn.x, respawn.y);
  player.invulnT = 1.5;
  state = 'play';
}

// =====================================================================
//  碰撞工具
// =====================================================================
function tileAt(tx, ty) {
  if (tx < 0 || tx >= gridW) return T_SOLID;      // 左右边界视为墙
  if (ty < 0 || ty >= gridH) return T_EMPTY;      // 上下开放
  return grid[ty][tx];
}
function crumbleGone(tx, ty) {
  const s = crumbleState.get(tx+','+ty);
  return s ? s.gone : false;
}
function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// 实体与瓦片碰撞（X 后 Y 分轴解算）
function moveAndCollide(e, dt, opts = {}) {
  e.onGround = false;
  e.standMover = null;
  const prevBottom = e.y + e.h;

  // ---- X 轴 ----
  e.x += e.vx * dt;
  {
    const ty0 = Math.floor(e.y / TILE), ty1 = Math.floor((e.y + e.h - 1) / TILE);
    if (e.vx > 0) {
      const tx = Math.floor((e.x + e.w) / TILE);
      for (let ty = ty0; ty <= ty1; ty++) {
        const t = tileAt(tx, ty);
        if (t === T_SOLID || t === T_ICE || (t === T_CRUMBLE && !crumbleGone(tx, ty))) {
          e.x = tx * TILE - e.w - 0.01; e.vx = 0; e.hitWall = true; break;
        }
      }
    } else if (e.vx < 0) {
      const tx = Math.floor(e.x / TILE);
      for (let ty = ty0; ty <= ty1; ty++) {
        const t = tileAt(tx, ty);
        if (t === T_SOLID || t === T_ICE || (t === T_CRUMBLE && !crumbleGone(tx, ty))) {
          e.x = (tx + 1) * TILE + 0.01; e.vx = 0; e.hitWall = true; break;
        }
      }
    }
  }

  // ---- Y 轴 ----
  e.y += e.vy * dt;
  {
    const tx0 = Math.floor(e.x / TILE), tx1 = Math.floor((e.x + e.w - 1) / TILE);
    if (e.vy > 0) {
      const ty = Math.floor((e.y + e.h) / TILE);
      for (let tx = tx0; tx <= tx1; tx++) {
        const t = tileAt(tx, ty);
        const top = ty * TILE;
        const solidHit = isSolidT(t) || (t === T_CRUMBLE && !crumbleGone(tx, ty));
        const onewayHit = t === T_ONEWAY && prevBottom <= top + 4;
        if (solidHit || onewayHit) {
          e.y = top - e.h; e.vy = 0; e.onGround = true;
          if (t === T_CRUMBLE && opts.triggerCrumble) triggerCrumble(tx, ty);
          break;
        }
      }
    } else if (e.vy < 0) {
      const ty = Math.floor(e.y / TILE);
      for (let tx = tx0; tx <= tx1; tx++) {
        const t = tileAt(tx, ty);
        if (isSolidT(t) || (t === T_CRUMBLE && !crumbleGone(tx, ty))) {
          e.y = (ty + 1) * TILE + 0.01; e.vy = 0; break;
        }
      }
    }
  }

  // ---- 移动平台（仅顶面单向）----
  if (opts.movers && e.vy >= 0) {
    for (const m of movers) {
      if (e.x + e.w > m.x && e.x < m.x + m.w &&
          prevBottom <= m.y + 6 && e.y + e.h >= m.y && e.y + e.h <= m.y + m.h + 14) {
        e.y = m.y - e.h; e.vy = 0; e.onGround = true; e.standMover = m;
      }
    }
  }
  e.prevBottom = prevBottom;
}

function triggerCrumble(tx, ty) {
  const s = crumbleState.get(tx+','+ty);
  if (s && s.t < 0 && !s.gone) { s.t = 0.45; sfx.crumble(); }
}

// =====================================================================
//  伤害 / 得分
// =====================================================================
function damage(fromX, respawnAfter = false) {
  if (player.invulnT > 0 || player.dead) return;
  player.hp--;
  sfx.hurt();
  shakeT = 0.25;
  burst(player.x + player.w/2, player.y + player.h/2, '#ff5f5f', 14);
  if (player.hp <= 0) {
    player.dead = true;
    sfx.die();
    state = 'over';
    return;
  }
  if (respawnAfter) {
    player.x = respawn.x; player.y = respawn.y;
    player.vx = 0; player.vy = 0;
  } else {
    player.vx = (player.x + player.w/2 < fromX ? -1 : 1) * 200;
    player.vy = -280;
  }
  player.invulnT = 1.5;
}
function addScore(n, x, y, label) {
  levelScore += n; totalScore += n;
  popups.push({x, y, txt: label || ('+' + n), t: 0.9});
}

// =====================================================================
//  粒子
// =====================================================================
function burst(x, y, color, n = 8, spd = 160) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = spd * (0.4 + Math.random() * 0.6);
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 60, life:0.5+Math.random()*0.3, color, size:2+Math.random()*3, grav:600});
  }
}
function dust(x, y) {
  for (let i = 0; i < 5; i++)
    particles.push({x:x+(Math.random()-0.5)*16, y, vx:(Math.random()-0.5)*70, vy:-Math.random()*60,
      life:0.3+Math.random()*0.2, color:'rgba(255,255,255,0.7)', size:2+Math.random()*2, grav:200});
}

// =====================================================================
//  更新
// =====================================================================
function update(dt) {
  if (state !== 'play') return;
  levelTime += dt;
  if (hintT > 0) hintT -= dt;
  if (shakeT > 0) shakeT -= dt;
  jumpBufT = Math.max(0, jumpBufT - dt);

  const p = player;
  p.invulnT = Math.max(0, p.invulnT - dt);
  p.starT = Math.max(0, p.starT - dt);
  if (bootsT > 0) {
    bootsT = Math.max(0, bootsT - dt);
    if (bootsT === 0) {
      popups.push({x:p.x + p.w/2, y:p.y - 12, txt:'二段跳失效了', t:1.2});
      sfx.beep(600, 220, 0.3, 'triangle', 0.09);
    }
  }
  p.squash = Math.max(0, p.squash - dt * 4);
  if (p.starT > 0 && Math.random() < 0.4)
    particles.push({x:p.x+Math.random()*p.w, y:p.y+Math.random()*p.h,
      vx:(Math.random()-0.5)*40, vy:-40, life:0.4, color:'hsl('+(Math.random()*360|0)+',90%,70%)', size:3, grav:0});

  // ---- 横向（冰面上加速慢、几乎不刹车） ----
  const underT = tileAt(Math.floor((p.x + p.w/2) / TILE), Math.floor((p.y + p.h + 2) / TILE));
  const onIce = p.onGround && underT === T_ICE;
  const acc = (p.onGround ? MOVE_ACC : AIR_ACC) * (onIce ? 0.55 : 1);
  if (left())  { p.vx -= acc * dt; p.face = -1; }
  if (right()) { p.vx += acc * dt; p.face = 1; }
  if (!left() && !right()) {
    const fr = (p.onGround ? FRICTION * (onIce ? 0.08 : 1) : AIR_DRAG) * dt;
    p.vx = Math.abs(p.vx) < fr ? 0 : p.vx - Math.sign(p.vx) * fr;
  }
  p.vx = Math.max(-MAX_SPD, Math.min(MAX_SPD, p.vx));
  if (p.onGround && Math.abs(p.vx) > 40) p.runT += dt * Math.abs(p.vx) / 60; else p.runT = 0;

  // ---- 重力 / 跳跃 ----
  p.vy += GRAV * dt;
  if (p.vy > 900) p.vy = 900;
  p.coyoteT = p.onGround ? COYOTE : Math.max(0, p.coyoteT - dt);
  if (p.onGround) p.airJumps = 1;
  if (jumpBufT > 0 && p.coyoteT > 0) {
    p.vy = -JUMP_V; p.coyoteT = 0; jumpBufT = 0;
    p.squash = 0.2; sfx.jump(); dust(p.x + p.w/2, p.y + p.h);
  } else if (jumpBufT > 0 && bootsT > 0 && p.airJumps > 0 && p.coyoteT <= 0) {
    // 二段跳：空中光环
    p.vy = -JUMP_V * 0.92; p.airJumps--; jumpBufT = 0;
    sfx.jump();
    for (let i = 0; i < 10; i++) {
      const a = i / 10 * Math.PI * 2;
      particles.push({x:p.x+p.w/2+Math.cos(a)*15, y:p.y+p.h-2, vx:Math.cos(a)*70, vy:25,
        life:0.32, color:'#9fd8ff', size:3, grav:0});
    }
  }
  if (!jumpHeld() && p.vy < -220) p.vy = -220;   // 松手截断 = 可变跳高

  // ---- 移动平台更新（先动平台再载人）----
  for (const m of movers) {
    m.t += dt;
    const off = Math.sin(m.t * 1.1) * m.amp;
    const nx = m.axis === 'x' ? m.ox + off : m.ox;
    const ny = m.axis === 'y' ? m.oy + off : m.oy;
    m.dx = nx - m.x; m.dy = ny - m.y;
    m.x = nx; m.y = ny;
  }

  const wasGround = p.onGround;
  moveAndCollide(p, dt, {movers: true, triggerCrumble: true});
  if (p.standMover) { p.x += p.standMover.dx; p.y += p.standMover.dy; }
  if (!wasGround && p.onGround) { p.squash = 0.25; dust(p.x + p.w/2, p.y + p.h); }

  // ---- 崩塌砖计时 ----
  for (const [key, s] of crumbleState) {
    if (s.t > 0) {
      s.t -= dt;
      if (s.t <= 0) {
        s.gone = true; s.regen = 3.0;
        const [tx, ty] = key.split(',').map(Number);
        burst(tx*TILE+16, ty*TILE+16, '#b8a58c', 8, 90);
      }
    } else if (s.gone) {
      s.regen -= dt;
      if (s.regen <= 0) { s.gone = false; s.t = -1; }
    }
  }

  // ---- 尖刺 / 岩浆 ----
  {
    const box = {x:p.x+3, y:p.y+4, w:p.w-6, h:p.h-4};
    const tx0 = Math.floor(box.x/TILE), tx1 = Math.floor((box.x+box.w)/TILE);
    const ty0 = Math.floor(box.y/TILE), ty1 = Math.floor((box.y+box.h)/TILE);
    outer:
    for (let ty = ty0; ty <= ty1; ty++) for (let tx = tx0; tx <= tx1; tx++) {
      const t = tileAt(tx, ty);
      if (t === T_SPIKE && p.starT <= 0) {
        // 尖刺只有下半格有杀伤
        if (box.y + box.h > ty*TILE + 14) { damage(tx*TILE+16); break outer; }
      } else if (t === T_LAVA) {
        burst(p.x+p.w/2, p.y+p.h, '#ff8f3f', 12);
        damage(tx*TILE+16, true); break outer;
      }
    }
  }

  // ---- 掉出地图 ----
  if (p.y > gridH * TILE + 60) damage(p.x, true);

  // ---- 弹簧 ----
  for (const s of springs) {
    s.anim = Math.max(0, s.anim - dt * 3);
    if (p.vy >= 0 && overlap({x:p.x,y:p.y,w:p.w,h:p.h}, s) && p.prevBottom <= s.y + 12) {
      p.vy = -SPRING_V; p.y = s.y - p.h;
      s.anim = 1; sfx.spring(); p.squash = 0.3;
      dust(s.x + s.w/2, s.y);
    }
  }

  // ---- 金币 / 红心 ----
  for (const c of coins) {
    if (c.taken) continue;
    c.t += dt;
    if (Math.hypot(p.x+p.w/2-c.x, p.y+p.h/2-c.y) < 24) {
      c.taken = true; coinCount++;
      addScore(100, c.x, c.y - 10);
      sfx.coin();
      burst(c.x, c.y, '#ffd94a', 6, 90);
    }
  }
  for (const h of hearts) {
    if (h.taken) continue;
    h.t += dt;
    if (Math.hypot(p.x+p.w/2-h.x, p.y+p.h/2-h.y) < 26) {
      h.taken = true;
      if (p.hp < 5) p.hp++;
      addScore(0, h.x, h.y - 10, '+1 ❤');
      sfx.heart();
      burst(h.x, h.y, '#ff6b81', 8, 100);
    }
  }
  for (const g of gems) {
    if (g.taken) continue;
    g.t += dt;
    if (Math.hypot(p.x+p.w/2-g.x, p.y+p.h/2-g.y) < 26) {
      g.taken = true; gemsRun++;
      addScore(500, g.x, g.y - 10, '+500 宝石！');
      sfx.gem();
      burst(g.x, g.y, '#7ee8fa', 10, 130);
    }
  }
  for (const s of stars) {
    if (s.taken) continue;
    s.t += dt;
    if (Math.hypot(p.x+p.w/2-s.x, p.y+p.h/2-s.y) < 26) {
      s.taken = true; p.starT = 6;
      popups.push({x:s.x, y:s.y-12, txt:'无敌！冲啊！', t:1.3});
      sfx.star();
      burst(s.x, s.y, '#ffe66d', 14, 160);
    }
  }
  for (const b of bootsItems) {
    if (b.taken) continue;
    b.t += dt;
    if (Math.hypot(p.x+p.w/2-b.x, p.y+p.h/2-b.y) < 26) {
      b.taken = true; bootsT = 30;
      popups.push({x:b.x, y:b.y-12, txt:'二段跳靴！30 秒内空中可再跳一次', t:2.4});
      sfx.boots();
      burst(b.x, b.y, '#9fd8ff', 12, 140);
    }
  }

  // ---- 检查点 ----
  for (const c of checkpoints) {
    if (!c.active && Math.abs(p.x + p.w/2 - c.x) < 22 && Math.abs(p.y + p.h - (c.y + TILE)) < 40) {
      c.active = true;
      respawn = {x: c.x - p.w/2, y: c.y - p.h};
      sfx.flag();
      popups.push({x:c.x, y:c.y - 14, txt:'检查点！', t:1.1});
      burst(c.x, c.y + 6, '#7dff9b', 10, 110);
    }
  }

  // ---- 敌人 ----
  for (const e of enemies) {
    if (e.dead) { e.deadT += dt; continue; }
    e.t += dt;
    if (e.kind === 'flyer') {
      e.y = e.oy + Math.sin(e.t * 2.2) * TILE * 1.5;
    } else if (e.kind === 'turret') {
      // 炮台：玩家进入射程后蓄能开火
      e.cool -= dt;
      const dx = (p.x + p.w/2) - (e.x + e.w/2);
      e.dir = dx < 0 ? -1 : 1;
      if (e.cool <= 0 && Math.abs(dx) < 430 && Math.abs((p.y+p.h/2)-(e.y+e.h/2)) < 110) {
        e.cool = 2.2;
        bullets.push({x: e.x + e.w/2 + e.dir*20, y: e.y + 8, vx: e.dir * 190, life: 4});
        sfx.shoot();
      }
    } else if (e.kind === 'hopper') {
      // 跳跳怪：蹲一下然后朝玩家蹦
      e.vy = (e.vy || 0) + GRAV * dt;
      if (e.vy > 700) e.vy = 700;
      if (e.onGround) {
        e.vx = 0;
        e.wait -= dt;
        if (e.wait <= 0) {
          e.wait = 1.0 + Math.random() * 0.5;
          e.dir = p.x > e.x ? 1 : -1;
          e.vx = e.dir * 130;
          e.vy = -430;
        }
      }
      moveAndCollide(e, dt, {});
    } else {
      e.vx = e.dir * e.spd;
      e.vy = (e.vy || 0) + GRAV * dt;
      if (e.vy > 700) e.vy = 700;
      e.hitWall = false;
      moveAndCollide(e, dt, {});
      if (e.hitWall) e.dir *= -1;
      // 前沿悬空或踩到尖刺则转向
      if (e.onGround) {
        const aheadX = e.dir > 0 ? e.x + e.w + 2 : e.x - 2;
        const atx = Math.floor(aheadX / TILE);
        const footTy = Math.floor((e.y + e.h + 4) / TILE);
        const bodyTy = Math.floor((e.y + e.h - 6) / TILE);
        const t = tileAt(atx, footTy);
        const support = isSolidT(t) || t === T_ONEWAY || (t === T_CRUMBLE && !crumbleGone(atx, footTy));
        if (!support || tileAt(atx, bodyTy) === T_SPIKE) e.dir *= -1;
      }
    }
    // 与玩家交互
    if (p.invulnT <= 0 && !p.dead &&
        overlap({x:p.x+2,y:p.y+2,w:p.w-4,h:p.h-4}, e)) {
      const stompable = e.kind !== 'spiky';
      if (p.starT > 0) {
        // 无敌状态：碰谁谁死
        e.dead = true; e.deadT = 0;
        stompCount++;
        addScore(200, e.x + e.w/2, e.y - 8);
        sfx.stomp();
        burst(e.x + e.w/2, e.y + e.h/2, '#ffe66d', 12);
      } else if (stompable && p.vy > 60 && p.prevBottom <= e.y + 12) {
        e.dead = true; e.deadT = 0;
        p.vy = -JUMP_V * 0.62;
        stompCount++;
        addScore(200, e.x + e.w/2, e.y - 8);
        sfx.stomp();
        burst(e.x + e.w/2, e.y + e.h/2, e.kind === 'flyer' ? '#8ecae6' : '#e07a5f', 10);
      } else {
        damage(e.x + e.w/2);
      }
    }
  }

  // ---- 炮台子弹 ----
  for (const b of bullets) {
    b.life -= dt;
    b.x += b.vx * dt;
    if (isSolidT(tileAt(Math.floor(b.x/TILE), Math.floor(b.y/TILE)))) {
      b.life = 0;
      burst(b.x, b.y, '#c9a2ff', 5, 70);
    }
    if (b.life > 0 && !p.dead &&
        b.x > p.x && b.x < p.x + p.w && b.y > p.y && b.y < p.y + p.h) {
      if (p.starT > 0) { addScore(50, b.x, b.y); burst(b.x, b.y, '#c9a2ff', 6, 80); }
      else if (p.invulnT <= 0) damage(b.x);
      b.life = 0;
    }
  }
  bullets = bullets.filter(b => b.life > 0);

  // ---- 史莱姆王 ----
  if (boss && !boss.dead) {
    const B = boss;
    B.t += dt;
    if (!B.active && p.x > B.arenaL + TILE) {
      B.active = true;
      popups.push({x:B.x + B.w/2, y:B.y - 24, txt:'史莱姆王 出现！', t:1.6});
      shakeT = 0.3;
      sfx.bossHit();
    }
    B.squish = Math.max(0, B.squish - dt * 2.5);
    B.vy += GRAV * dt;
    if (B.vy > 800) B.vy = 800;
    if (B.active && B.stunT <= 0) {
      if (B.onGround) {
        B.vx = 0;
        B.pauseT -= dt;
        if (B.pauseT <= 0) {
          const rage = B.maxHp - B.hp;          // 血越少越狂暴
          B.hops++;
          const slam = B.hops % 4 === 0;
          B.dir = p.x > B.x + B.w/2 ? 1 : -1;
          B.vx = B.dir * (slam ? 90 : 135 + rage * 18);
          B.vy = slam ? -690 : -500;
          B.pauseT = Math.max(0.35, 1.05 - rage * 0.1);
          B.squish = 0.3;
        }
      }
    } else if (B.stunT > 0) {
      B.stunT -= dt;
      if (B.onGround) B.vx = 0;
    }
    const bossWasG = B.onGround;
    moveAndCollide(B, dt, {});
    B.x = Math.max(B.arenaL, Math.min(B.arenaR - B.w, B.x));
    if (!bossWasG && B.onGround) {
      B.squish = 0.5;
      shakeT = Math.max(shakeT, 0.18);
      dust(B.x + 20, B.y + B.h); dust(B.x + B.w - 20, B.y + B.h);
      sfx.stomp();
    }
    // 召唤跳跳怪（场上最多 2 只）
    if (B.active && B.stunT <= 0) {
      B.minionT -= dt;
      const alive = enemies.filter(e => e.minion && !e.dead).length;
      if (B.minionT <= 0 && alive < (LEVELS[level].bossMinions || 2)) {
        B.minionT = LEVELS[level].bossMinionT || 9;
        const m = mkEnemy('hopper', B.dir > 0 ? B.x - 44 : B.x + B.w + 18, B.y + B.h - 34);
        m.minion = true;
        enemies.push(m);
        burst(m.x + 12, m.y + 10, '#b48ead', 8);
      }
    }
    // 与玩家交互：踩头掉血，侧面碰撞受伤
    if (p.invulnT <= 0 && !p.dead && overlap({x:p.x, y:p.y, w:p.w, h:p.h}, B)) {
      const stompHit = p.vy > 60 && p.prevBottom <= B.y + 14;
      if (p.starT > 0 || stompHit) {
        if (B.stunT <= 0) {
          B.hp--;
          B.stunT = 1.25;
          B.squish = 0.6;
          p.vy = -JUMP_V * 0.8;
          addScore(300, B.x + B.w/2, B.y - 10);
          sfx.bossHit();
          shakeT = 0.25;
          burst(B.x + B.w/2, B.y + 10, '#b4f06e', 16, 220);
          if (B.hp <= 0) {
            B.dead = true;
            addScore(1000, B.x + B.w/2, B.y - 34, '+1000 击败魔王！');
            sfx.bossDie();
            shakeT = 0.5;
            burst(B.x + B.w/2, B.y + B.h/2, '#b4f06e', 40, 300);
            for (const g of gates) {
              grid[g.ty][g.tx] = T_EMPTY;
              burst(g.tx*TILE + 16, g.ty*TILE + 16, '#c9a2ff', 10, 150);
            }
            popups.push({x:B.x + B.w/2, y:B.y - 60, txt:'城门碎裂了！', t:1.8});
          }
        } else if (stompHit) p.vy = -JUMP_V * 0.6;   // 眩晕期只弹跳不掉血
      } else if (B.stunT <= 0) {
        damage(B.x + B.w/2);
      }
    }
  }

  // ---- 终点 ----
  if (Math.abs(p.x + p.w/2 - goal.x) < 26 && p.y + p.h > goal.y - TILE*2.5 && p.y < goal.y + TILE) {
    const L = LEVELS[level];
    const timeBonus = Math.max(0, Math.round((L.par - levelTime) * 10));
    totalScore += timeBonus;
    clearStats = { coins: coinCount, stomps: stompCount, time: levelTime, bonus: timeBonus,
      score: levelScore + timeBonus,
      gems: gems.filter(g => g.taken).length, gemsTotal: gems.length };
    state = 'clear';
    sfx.win();
    burst(goal.x, goal.y - 40, '#ffd94a', 24, 200);
  }

  // ---- 粒子 / 飘字 ----
  for (const q of particles) {
    q.life -= dt; q.vy += q.grav * dt;
    q.x += q.vx * dt; q.y += q.vy * dt;
  }
  particles = particles.filter(q => q.life > 0);
  for (const q of popups) { q.t -= dt; q.y -= 34 * dt; }
  popups = popups.filter(q => q.t > 0);

  // ---- 摄像机 ----
  const targetX = p.x + p.w/2 - W * 0.42 + p.face * 40;
  camX += (targetX - camX) * Math.min(1, dt * 6);
  camX = Math.max(0, Math.min(gridW * TILE - W, camX));
  const targetY = p.y + p.h/2 - H * 0.55;
  camY += (targetY - camY) * Math.min(1, dt * 5);
  camY = Math.max(0, Math.min(Math.max(0, gridH * TILE - H), camY));
}

// =====================================================================
//  渲染
// =====================================================================
function draw(time) {
  const L = LEVELS[level];

  // 天空
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, L.sky[0]); sky.addColorStop(1, L.sky[1]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 视差远山与云
  drawParallax(L, time);

  ctx.save();
  const sx = shakeT > 0 ? (Math.random()-0.5) * 8 : 0;
  const sy = shakeT > 0 ? (Math.random()-0.5) * 8 : 0;
  ctx.translate(-Math.round(camX + sx), -Math.round(camY + sy));

  drawTiles(L, time);
  drawGoal(time);
  for (const c of checkpoints) drawCheckpoint(c, time);
  for (const s of springs) drawSpring(s);
  for (const m of movers) drawMover(m, L);
  for (const c of coins) if (!c.taken) drawCoin(c);
  for (const h of hearts) if (!h.taken) drawHeart(h);
  for (const g of gems) if (!g.taken) drawGem(g);
  for (const s of stars) if (!s.taken) drawStar(s);
  for (const b of bootsItems) if (!b.taken) drawBoots(b);
  for (const g of gates) if (grid[g.ty][g.tx] !== T_EMPTY) drawGateRune(g, time);
  for (const e of enemies) drawEnemy(e, time);
  for (const b of bullets) drawBullet(b);
  if (boss && !boss.dead) drawBoss(time);
  if (!player.dead) drawPlayer(time);

  for (const q of particles) {
    ctx.globalAlpha = Math.min(1, q.life * 2.5);
    ctx.fillStyle = q.color;
    ctx.fillRect(q.x - q.size/2, q.y - q.size/2, q.size, q.size);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.font = 'bold 15px "Segoe UI", sans-serif';
  for (const q of popups) {
    ctx.globalAlpha = Math.min(1, q.t * 2.5);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3;
    ctx.strokeText(q.txt, q.x, q.y);
    ctx.fillText(q.txt, q.x, q.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  drawHUD(L);
  if (state === 'title') drawTitle(time);
  if (state === 'pause') drawPause();
  if (state === 'clear') drawClear();
  if (state === 'over')  drawOver();
  if (state === 'win')   drawWin();
}

function drawParallax(L, time) {
  if (L.stars) {
    // 星空：闪烁的星星 + 一轮月亮
    for (let i = 0; i < 70; i++) {
      const sx = ((i * 137.5 - camX * 0.12) % (W + 20) + W + 20) % (W + 20) - 10;
      const sy = (i * 89.7) % (H * 0.8);
      const tw = 0.5 + 0.5 * Math.sin(time * 0.003 + i * 1.7);
      ctx.fillStyle = 'rgba(255,255,255,' + (0.2 + 0.6 * tw).toFixed(2) + ')';
      ctx.fillRect(sx, sy, i % 7 === 0 ? 3 : 2, i % 7 === 0 ? 3 : 2);
    }
    ctx.fillStyle = '#f4ecd8';
    ctx.beginPath(); ctx.arc(W - 140 - camX * 0.05 % 40, 90, 34, 0, 7); ctx.fill();
    ctx.fillStyle = L.sky[0];
    ctx.beginPath(); ctx.arc(W - 128 - camX * 0.05 % 40, 82, 30, 0, 7); ctx.fill();
  } else {
    // 云
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    for (let i = 0; i < 6; i++) {
      const cx = ((i * 260 + time * 0.008 - camX * 0.15) % (W + 300)) - 150;
      const cy = 50 + (i % 3) * 55;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 46, 15, 0, 0, 7);
      ctx.ellipse(cx + 30, cy - 8, 32, 13, 0, 0, 7);
      ctx.ellipse(cx - 28, cy - 5, 28, 11, 0, 0, 7);
      ctx.fill();
    }
  }
  // 两层远山
  for (const [col, f, hh] of [[L.hill, 0.25, 150], [L.hill2, 0.45, 95]]) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 8) {
      const wx = x + camX * f;
      const y = H - hh - Math.sin(wx * 0.006) * 40 - Math.sin(wx * 0.0023 + 2) * 55;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.fill();
  }
}

function drawTiles(L, time) {
  const x0 = Math.floor(camX / TILE), x1 = Math.ceil((camX + W) / TILE);
  const y0 = Math.floor(camY / TILE), y1 = Math.ceil((camY + H) / TILE);
  for (let ty = Math.max(0, y0); ty <= Math.min(gridH - 1, y1); ty++) {
    for (let tx = Math.max(0, x0); tx <= Math.min(gridW - 1, x1); tx++) {
      const t = grid[ty][tx];
      if (t === T_EMPTY) continue;
      const px = tx * TILE, py = ty * TILE;
      if (t === T_SOLID) {
        ctx.fillStyle = L.dirt;
        ctx.fillRect(px, py, TILE, TILE);
        if (tileAt(tx, ty - 1) !== T_SOLID) {           // 顶面草皮
          ctx.fillStyle = L.grass;
          ctx.fillRect(px, py, TILE, 8);
          ctx.fillRect(px + 3, py + 8, 4, 3);
          ctx.fillRect(px + 14, py + 8, 5, 4);
          ctx.fillRect(px + 25, py + 8, 4, 3);
        }
        ctx.fillStyle = 'rgba(0,0,0,0.12)';             // 砖缝阴影
        ctx.fillRect(px, py + TILE - 3, TILE, 3);
        ctx.fillRect(px + TILE - 2, py, 2, TILE);
      } else if (t === T_ICE) {
        ctx.fillStyle = '#9fd8f0';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fillRect(px + 2, py + 2, TILE - 4, 6);
        ctx.fillStyle = 'rgba(90,150,200,0.4)';
        ctx.fillRect(px, py + TILE - 4, TILE, 4);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillRect(px + 20, py + 12, 3, 10);
      } else if (t === T_ONEWAY) {
        ctx.fillStyle = L.brick;
        ctx.fillRect(px, py, TILE, 10);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(px, py, TILE, 3);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(px + 4, py + 10, 3, 5);
        ctx.fillRect(px + TILE - 7, py + 10, 3, 5);
      } else if (t === T_SPIKE) {
        ctx.fillStyle = '#c9ced6';
        for (let i = 0; i < 4; i++) {
          const bx = px + i * 8;
          ctx.beginPath();
          ctx.moveTo(bx, py + TILE);
          ctx.lineTo(bx + 4, py + 10);
          ctx.lineTo(bx + 8, py + TILE);
          ctx.fill();
        }
      } else if (t === T_LAVA) {
        const wob = Math.sin(time * 0.004 + tx * 1.3) * 3;
        ctx.fillStyle = '#e2504c';
        ctx.fillRect(px, py + 8 + wob, TILE, TILE - 8 - wob);
        ctx.fillStyle = '#ff9a3d';
        ctx.fillRect(px, py + 8 + wob, TILE, 5);
        if (Math.random() < 0.003)
          particles.push({x:px+Math.random()*TILE, y:py+10, vx:0, vy:-70-Math.random()*50,
            life:0.8, color:'#ff9a3d', size:3, grav:60});
      } else if (t === T_CRUMBLE) {
        const s = crumbleState.get(tx+','+ty);
        if (s.gone) continue;
        const shake = s.t > 0 ? (Math.random()-0.5) * 3 : 0;
        ctx.fillStyle = '#b8a58c';
        ctx.fillRect(px + shake, py + shake, TILE, TILE);
        ctx.strokeStyle = 'rgba(90,70,50,0.7)'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(px+6+shake, py+4+shake); ctx.lineTo(px+14+shake, py+16+shake); ctx.lineTo(px+8+shake, py+27+shake);
        ctx.moveTo(px+22+shake, py+6+shake); ctx.lineTo(px+18+shake, py+18+shake); ctx.lineTo(px+26+shake, py+28+shake);
        ctx.stroke();
      }
    }
  }
}

function drawPlayer(time) {
  const p = player;
  if (p.invulnT > 0 && Math.floor(time / 80) % 2 === 0) return;   // 受伤闪烁
  const squashY = 1 - p.squash * 0.5, squashX = 1 + p.squash * 0.4;
  const cx = p.x + p.w/2, bottom = p.y + p.h;
  ctx.save();
  ctx.translate(cx, bottom);
  ctx.scale(squashX, squashY);
  // 腿（跑动摆动；靴子生效时变蓝，快过期时闪烁）
  const legSwing = p.onGround && Math.abs(p.vx) > 40 ? Math.sin(p.runT * 14) * 5 : 0;
  const bootsOn = bootsT > 5 || (bootsT > 0 && Math.floor(time / 150) % 2 === 0);
  ctx.fillStyle = bootsOn ? '#4f9ff0' : '#c98a2b';
  ctx.fillRect(-8 + legSwing, -7, 7, 7);
  ctx.fillRect(1 - legSwing, -7, 7, 7);
  // 身体（无敌时彩虹闪烁）
  ctx.fillStyle = p.starT > 0 ? 'hsl(' + Math.floor(time * 0.5 % 360) + ',90%,65%)' : '#ffd166';
  roundRect(-p.w/2, -p.h, p.w, p.h - 5, 6);
  // 眼睛
  const ex = p.face * 4;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex - 4, -p.h + 10, 4.4, 0, 7); ctx.arc(ex + 5, -p.h + 10, 4.4, 0, 7); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(ex - 4 + p.face * 1.6, -p.h + 10.5, 2.1, 0, 7); ctx.arc(ex + 5 + p.face * 1.6, -p.h + 10.5, 2.1, 0, 7); ctx.fill();
  // 腮红
  ctx.fillStyle = 'rgba(255,120,120,0.5)';
  ctx.beginPath(); ctx.arc(ex - 8, -p.h + 16, 2.4, 0, 7); ctx.arc(ex + 9, -p.h + 16, 2.4, 0, 7); ctx.fill();
  ctx.restore();
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.fill();
}

function drawEnemy(e, time) {
  if (e.dead) {
    if (e.deadT > 0.3) return;
    ctx.globalAlpha = 1 - e.deadT / 0.3;
  }
  const cx = e.x + e.w/2, cy = e.y + e.h/2;
  if (e.kind === 'walker') {
    ctx.fillStyle = '#e07a5f';
    const bob = Math.sin(e.t * 9) * 1.5;
    roundRect(e.x, e.y + bob, e.w, e.h - bob, 8);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx + e.dir*5 - 4, e.y + 8, 3.6, 0, 7); ctx.arc(cx + e.dir*5 + 4, e.y + 8, 3.6, 0, 7); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx + e.dir*6.5 - 4, e.y + 8, 1.8, 0, 7); ctx.arc(cx + e.dir*6.5 + 4, e.y + 8, 1.8, 0, 7); ctx.fill();
  } else if (e.kind === 'spiky') {
    ctx.fillStyle = '#6d6875';
    for (let i = 0; i < 8; i++) {
      const a = i / 8 * Math.PI * 2 + e.t * 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 9, cy + Math.sin(a) * 9);
      ctx.lineTo(cx + Math.cos(a + 0.22) * 16, cy + Math.sin(a + 0.22) * 16);
      ctx.lineTo(cx + Math.cos(a + 0.44) * 9, cy + Math.sin(a + 0.44) * 9);
      ctx.fill();
    }
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, 7); ctx.fill();
    ctx.fillStyle = '#ff5f5f';
    ctx.beginPath(); ctx.arc(cx + e.dir*3 - 3, cy - 2, 2, 0, 7); ctx.arc(cx + e.dir*3 + 3, cy - 2, 2, 0, 7); ctx.fill();
  } else if (e.kind === 'turret') {
    ctx.fillStyle = '#7d8597';
    ctx.beginPath(); ctx.arc(cx, e.y + e.h, 15, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#5c6370';
    ctx.fillRect(cx + (e.dir > 0 ? 2 : -20), e.y + 3, 18, 7);
    // 蓄能灯：越接近开火越亮
    const charge = Math.max(0, 1.2 - e.cool);
    ctx.fillStyle = 'rgba(255,95,95,' + (0.4 + charge * 0.5).toFixed(2) + ')';
    ctx.beginPath(); ctx.arc(cx, e.y + 9, 4 + charge * 2.5, 0, 7); ctx.fill();
  } else if (e.kind === 'hopper') {
    const crouch = e.onGround ? Math.min(1, Math.max(0, e.wait)) * 4 : -3;
    ctx.fillStyle = '#b48ead';
    roundRect(e.x, e.y + crouch, e.w, e.h - crouch, 7);
    ctx.fillStyle = '#8e7099';
    ctx.fillRect(e.x + 2, e.y + e.h - 4, 6, 4);
    ctx.fillRect(e.x + e.w - 8, e.y + e.h - 4, 6, 4);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - 4, e.y + 7 + crouch, 3.4, 0, 7); ctx.arc(cx + 5, e.y + 7 + crouch, 3.4, 0, 7); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx - 4 + e.dir, e.y + 8 + crouch, 1.7, 0, 7); ctx.arc(cx + 5 + e.dir, e.y + 8 + crouch, 1.7, 0, 7); ctx.fill();
  } else {  // flyer
    const flap = Math.sin(e.t * 12) * 7;
    ctx.fillStyle = '#bde0ef';
    ctx.beginPath();
    ctx.moveTo(cx - 6, cy); ctx.lineTo(cx - 20, cy - 8 - flap); ctx.lineTo(cx - 8, cy + 4); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 6, cy); ctx.lineTo(cx + 20, cy - 8 - flap); ctx.lineTo(cx + 8, cy + 4); ctx.fill();
    ctx.fillStyle = '#5aa7c9';
    ctx.beginPath(); ctx.ellipse(cx, cy, 12, 9, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - 3, cy - 2, 3, 0, 7); ctx.arc(cx + 4, cy - 2, 3, 0, 7); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx - 3, cy - 1.6, 1.5, 0, 7); ctx.arc(cx + 4, cy - 1.6, 1.5, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawCoin(c) {
  const s = Math.abs(Math.cos(c.t * 3.2));
  const bob = Math.sin(c.t * 2.5) * 3;
  ctx.fillStyle = '#f5b81e';
  ctx.beginPath(); ctx.ellipse(c.x, c.y + bob, 9 * s + 1.5, 10, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#ffe38a';
  ctx.beginPath(); ctx.ellipse(c.x, c.y + bob, 5 * s + 0.8, 6, 0, 0, 7); ctx.fill();
}
function drawHeart(h) {
  const bob = Math.sin(h.t * 2.5) * 3, s = 1 + Math.sin(h.t * 5) * 0.08;
  ctx.save(); ctx.translate(h.x, h.y + bob); ctx.scale(s, s);
  heartPath(0, 0, 10);
  ctx.fillStyle = '#ff5f7a'; ctx.fill();
  ctx.restore();
}
function drawGem(g) {
  const bob = Math.sin(g.t * 2.4) * 3;
  ctx.save(); ctx.translate(g.x, g.y + bob);
  ctx.rotate(Math.sin(g.t * 1.2) * 0.18);
  ctx.fillStyle = '#7ee8fa';
  ctx.beginPath();
  ctx.moveTo(0, -11); ctx.lineTo(9, 0); ctx.lineTo(0, 11); ctx.lineTo(-9, 0); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.moveTo(0, -11); ctx.lineTo(4, 0); ctx.lineTo(0, 4); ctx.lineTo(-4, 0); ctx.fill();
  ctx.restore();
}
function drawStar(s) {
  const bob = Math.sin(s.t * 2.4) * 3;
  ctx.save(); ctx.translate(s.x, s.y + bob); ctx.rotate(s.t * 1.6);
  ctx.fillStyle = '#ffe66d';
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? 13 : 6, a = i / 10 * Math.PI * 2 - Math.PI / 2;
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.fill();
  ctx.restore();
}
function drawBoots(b) {
  const bob = Math.sin(b.t * 2.4) * 3;
  ctx.save(); ctx.translate(b.x, b.y + bob);
  ctx.fillStyle = 'rgba(159,216,255,0.25)';
  ctx.beginPath(); ctx.arc(0, 0, 17, 0, 7); ctx.fill();
  ctx.fillStyle = '#4f9ff0';
  roundRect(-12, -8, 10, 15, 3); roundRect(2, -8, 10, 15, 3);
  ctx.fillStyle = '#dcecfb';
  ctx.fillRect(-12, 3, 10, 4); ctx.fillRect(2, 3, 10, 4);
  ctx.restore();
}
function drawBullet(b) {
  ctx.fillStyle = 'rgba(201,162,255,0.35)';
  ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, 7); ctx.fill();
  ctx.fillStyle = '#c9a2ff';
  ctx.beginPath(); ctx.arc(b.x, b.y, 4.5, 0, 7); ctx.fill();
}
function drawGateRune(g, time) {
  const px = g.tx * TILE, py = g.ty * TILE;
  const glow = 0.35 + 0.25 * Math.sin(time * 0.004 + g.ty);
  ctx.fillStyle = 'rgba(120,60,180,0.45)';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.strokeStyle = 'rgba(220,160,255,' + glow.toFixed(2) + ')';
  ctx.lineWidth = 2;
  ctx.strokeRect(px + 5, py + 5, TILE - 10, TILE - 10);
  ctx.beginPath();
  ctx.moveTo(px + 16, py + 8); ctx.lineTo(px + 16, py + 24);
  ctx.moveTo(px + 9, py + 16); ctx.lineTo(px + 23, py + 16);
  ctx.stroke();
}
function drawBoss(time) {
  const B = boss;
  const sq = 1 - B.squish * 0.35, sx = 1 + B.squish * 0.3;
  const cx = B.x + B.w/2, bottom = B.y + B.h;
  ctx.save();
  ctx.translate(cx, bottom);
  ctx.scale(sx, sq);
  // 身体
  const dark = LEVELS[level].bossDark;
  ctx.fillStyle = B.stunT > 0 ? (dark ? '#6d5a94' : '#8fb573') : (dark ? '#9d7bd8' : '#a3d977');
  ctx.beginPath();
  ctx.moveTo(-B.w/2, 0);
  ctx.quadraticCurveTo(-B.w/2 - 8, -B.h, 0, -B.h);
  ctx.quadraticCurveTo(B.w/2 + 8, -B.h, B.w/2, 0);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.ellipse(-B.w/5, -B.h*0.72, 14, 8, -0.5, 0, 7); ctx.fill();
  // 王冠
  ctx.fillStyle = '#ffd94a';
  ctx.beginPath();
  ctx.moveTo(-20, -B.h + 6);
  ctx.lineTo(-20, -B.h - 12); ctx.lineTo(-10, -B.h - 1); ctx.lineTo(0, -B.h - 15);
  ctx.lineTo(10, -B.h - 1); ctx.lineTo(20, -B.h - 12); ctx.lineTo(20, -B.h + 6);
  ctx.fill();
  // 眼睛（眩晕时转圈圈）
  const d = B.dir || 1;
  if (B.stunT > 0) {
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    const a = time * 0.02;
    for (const ex of [-16, 16]) {
      ctx.beginPath(); ctx.arc(ex, -B.h*0.55, 6, a, a + 4.6); ctx.stroke();
    }
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(d*5 - 16, -B.h*0.55, 8, 0, 7); ctx.arc(d*5 + 16, -B.h*0.55, 8, 0, 7); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(d*8 - 16, -B.h*0.53, 4, 0, 7); ctx.arc(d*8 + 16, -B.h*0.53, 4, 0, 7); ctx.fill();
    ctx.strokeStyle = '#3a5a28'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-27, -B.h*0.74); ctx.lineTo(-8, -B.h*0.65);
    ctx.moveTo(27, -B.h*0.74); ctx.lineTo(8, -B.h*0.65);
    ctx.stroke();
  }
  ctx.restore();
}
function heartPath(x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x, y + r * 0.9);
  ctx.bezierCurveTo(x - r * 1.4, y - r * 0.2, x - r * 0.7, y - r * 1.1, x, y - r * 0.3);
  ctx.bezierCurveTo(x + r * 0.7, y - r * 1.1, x + r * 1.4, y - r * 0.2, x, y + r * 0.9);
}
function drawSpring(s) {
  const comp = s.anim * 8;
  ctx.fillStyle = '#9a3b3b';
  ctx.fillRect(s.x + 4, s.y + 10, s.w - 8, 6);
  ctx.strokeStyle = '#c9ced6'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(s.x + 8, s.y + 10);  ctx.lineTo(s.x + s.w - 8, s.y + 6 + comp * 0.4);
  ctx.moveTo(s.x + s.w - 8, s.y + 10); ctx.lineTo(s.x + 8, s.y + 5 + comp * 0.4);
  ctx.stroke();
  ctx.fillStyle = '#e2504c';
  ctx.fillRect(s.x + 2, s.y - 3 + comp, s.w - 4, 6);
}
function drawCheckpoint(c, time) {
  ctx.fillStyle = '#888';
  ctx.fillRect(c.x - 2, c.y - TILE * 1.6, 4, TILE * 2.6);
  const wave = Math.sin(time * 0.005) * 3;
  ctx.fillStyle = c.active ? '#5ad167' : '#aab';
  ctx.beginPath();
  ctx.moveTo(c.x + 2, c.y - TILE * 1.6);
  ctx.lineTo(c.x + 26, c.y - TILE * 1.6 + 8 + wave);
  ctx.lineTo(c.x + 2, c.y - TILE * 1.6 + 16);
  ctx.fill();
}
function drawGoal(time) {
  const g = goal;
  ctx.fillStyle = '#d9dee6';
  ctx.fillRect(g.x - 3, g.y - TILE * 3.4, 6, TILE * 3.4);
  ctx.beginPath(); ctx.arc(g.x, g.y - TILE * 3.4, 6, 0, 7); ctx.fillStyle = '#ffd94a'; ctx.fill();
  // 波浪大旗
  ctx.fillStyle = '#ff5f5f';
  ctx.beginPath();
  ctx.moveTo(g.x + 3, g.y - TILE * 3.2);
  for (let i = 0; i <= 10; i++) {
    const fx = g.x + 3 + i * 4.6;
    ctx.lineTo(fx, g.y - TILE * 3.2 + Math.sin(time * 0.006 + i * 0.6) * 4 + i * 0.6);
  }
  for (let i = 10; i >= 0; i--) {
    const fx = g.x + 3 + i * 4.6;
    ctx.lineTo(fx, g.y - TILE * 3.2 + 26 + Math.sin(time * 0.006 + i * 0.6 + 0.5) * 4 - i * 0.6);
  }
  ctx.fill();
}
function drawMover(m, L) {
  ctx.fillStyle = L.brick;
  roundRect(m.x, m.y, m.w, m.h, 4);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(m.x + 3, m.y + 2, m.w - 6, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  for (let i = 0; i < 3; i++) ctx.fillRect(m.x + 10 + i * 28, m.y + 8, 8, 3);
}

// ---------- HUD 与界面 ----------
function drawHUD(L) {
  if (state === 'title') return;
  ctx.save();
  // 血量
  for (let i = 0; i < Math.max(3, player.hp); i++) {
    ctx.save(); ctx.translate(30 + i * 30, 30);
    heartPath(0, 0, 11);
    ctx.fillStyle = i < player.hp ? '#ff5f7a' : 'rgba(255,255,255,0.25)';
    ctx.fill(); ctx.restore();
  }
  // 金币 / 分数
  ctx.fillStyle = '#f5b81e';
  ctx.beginPath(); ctx.ellipse(34, 66, 9, 10, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#ffe38a';
  ctx.beginPath(); ctx.ellipse(34, 66, 5, 6, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.font = 'bold 18px "Segoe UI", sans-serif';
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 3;
  ctx.strokeText('× ' + coinCount, 50, 73); ctx.fillText('× ' + coinCount, 50, 73);
  ctx.strokeText('分数 ' + totalScore, 26, 102); ctx.fillText('分数 ' + totalScore, 26, 102);
  // 宝石（本关有才显示）
  if (gems.length) {
    const got = gems.filter(g => g.taken).length;
    ctx.fillStyle = '#7ee8fa';
    ctx.beginPath();
    ctx.moveTo(32, 120); ctx.lineTo(39, 128); ctx.lineTo(32, 136); ctx.lineTo(25, 128); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.strokeText(got + '/' + gems.length, 50, 135); ctx.fillText(got + '/' + gems.length, 50, 135);
  }
  // 状态倒计时（无敌星 / 二段跳靴）
  let indY = gems.length ? 166 : 133;
  if (player.starT > 0) {
    ctx.fillStyle = 'hsl(' + Math.floor(levelTime * 300 % 360) + ',90%,65%)';
    ctx.strokeText('★ ' + player.starT.toFixed(1), 26, indY);
    ctx.fillText('★ ' + player.starT.toFixed(1), 26, indY);
    ctx.fillStyle = '#fff';
    indY += 33;
  }
  if (bootsT > 0) {
    ctx.fillStyle = bootsT <= 5 && Math.floor(levelTime * 4) % 2 === 0 ? '#ff8f8f' : '#9fd8ff';
    ctx.strokeText('👟 ' + bootsT.toFixed(1), 26, indY);
    ctx.fillText('👟 ' + bootsT.toFixed(1), 26, indY);
    ctx.fillStyle = '#fff';
  }
  // Boss 血条
  if (boss && boss.active && !boss.dead) {
    const bw = 300, bx = W/2 - bw/2, by = 50;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(bx - 6, by - 6, bw + 12, 24, 8);
    ctx.fillStyle = '#5d2a35';
    ctx.fillRect(bx, by, bw, 12);
    ctx.fillStyle = '#b4f06e';
    ctx.fillRect(bx, by, bw * boss.hp / boss.maxHp, 12);
    ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    const bn = '👑 ' + (LEVELS[level].bossName || '史莱姆王');
    ctx.strokeText(bn, W/2, by - 12);
    ctx.fillText(bn, W/2, by - 12);
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
  }
  // 关卡名 + 时间
  ctx.textAlign = 'center';
  ctx.strokeText(L.name, W/2, 34); ctx.fillText(L.name, W/2, 34);
  ctx.textAlign = 'right';
  ctx.strokeText(levelTime.toFixed(1) + 's', W - 26, 34);
  ctx.fillText(levelTime.toFixed(1) + 's', W - 26, 34);
  if (sfx.muted) { ctx.strokeText('🔇', W - 26, 64); ctx.fillText('🔇', W - 26, 64); }
  // 第一关操作提示
  if (level === 0 && hintT > 0 && state === 'play') {
    ctx.globalAlpha = Math.min(1, hintT);
    ctx.textAlign = 'center';
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.strokeText('←→/AD 移动 · 空格 跳跃(长按跳更高) · 踩敌人头消灭它 · 红色尖刺怪不能踩！', W/2, H - 28);
    ctx.fillText('←→/AD 移动 · 空格 跳跃(长按跳更高) · 踩敌人头消灭它 · 红色尖刺怪不能踩！', W/2, H - 28);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}
function panel(w, h) {
  ctx.fillStyle = 'rgba(10,12,26,0.82)';
  roundRect(W/2 - w/2, H/2 - h/2, w, h, 16);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2;
  ctx.stroke();
}
function bigText(txt, y, size = 44, color = '#fff') {
  ctx.textAlign = 'center';
  ctx.font = 'bold ' + size + 'px "Segoe UI", sans-serif';
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 5;
  ctx.strokeText(txt, W/2, y); ctx.fillText(txt, W/2, y);
}
function drawTitle(time) {
  ctx.fillStyle = 'rgba(8,10,24,0.55)';
  ctx.fillRect(0, 0, W, H);
  const bob = Math.sin(time * 0.002) * 8;
  bigText('星 尘 大 冒 险', H * 0.3 + bob, 58, '#ffd166');
  bigText('Stardust Adventure', H * 0.3 + 40 + bob, 20, '#9fb8ff');
  bigText('按 空格 / 任意键 开始', H * 0.58 + Math.sin(time * 0.005) * 3, 26);
  const best = getBest();
  if (best > 0) bigText('最高纪录 ' + best, H * 0.58 + 40, 18, '#ffd166');
  ctx.font = '17px "Segoe UI", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.textAlign = 'center';
  ctx.fillText('←→/AD 移动  ·  空格/W/↑ 跳跃  ·  Esc 暂停  ·  M 静音  ·  R 重开本关', W/2, H * 0.72);
  ctx.fillText('10 个关卡 · 隐藏宝石 · 限时二段跳 · 无敌星 · 两场 Boss 战！', W/2, H * 0.72 + 30);
}
function drawPause() {
  ctx.fillStyle = 'rgba(8,10,24,0.6)'; ctx.fillRect(0, 0, W, H);
  panel(420, 190);
  bigText('已暂停', H/2 - 28, 40);
  ctx.font = '18px "Segoe UI", sans-serif'; ctx.fillStyle = '#dde3f0'; ctx.textAlign = 'center';
  ctx.fillText('Esc/P 继续 · R 从检查点重来 · M 静音', W/2, H/2 + 30);
}
function drawClear() {
  ctx.fillStyle = 'rgba(8,10,24,0.6)'; ctx.fillRect(0, 0, W, H);
  panel(500, 300);
  bigText('过关！', H/2 - 92, 46, '#7dff9b');
  ctx.font = '20px "Segoe UI", sans-serif'; ctx.fillStyle = '#dde3f0'; ctx.textAlign = 'center';
  const s = clearStats;
  ctx.fillText('金币 ' + s.coins + ' 枚 · 击败敌人 ' + s.stomps + ' 个' +
    (s.gemsTotal ? ' · 宝石 ' + s.gems + '/' + s.gemsTotal + (s.gems === s.gemsTotal ? ' 全收集！' : '') : ''), W/2, H/2 - 34);
  ctx.fillText('用时 ' + s.time.toFixed(1) + 's · 时间奖励 +' + s.bonus, W/2, H/2 + 2);
  bigText('本关得分 ' + s.score, H/2 + 52, 30, '#ffd166');
  ctx.font = '18px "Segoe UI", sans-serif'; ctx.fillStyle = '#9fb8ff';
  ctx.fillText(level < LEVELS.length - 1 ? '按 空格 进入下一关' : '按 空格 查看结算', W/2, H/2 + 108);
}
function drawOver() {
  ctx.fillStyle = 'rgba(30,8,12,0.65)'; ctx.fillRect(0, 0, W, H);
  panel(460, 220);
  bigText('力竭倒下…', H/2 - 40, 44, '#ff6b81');
  ctx.font = '19px "Segoe UI", sans-serif'; ctx.fillStyle = '#dde3f0'; ctx.textAlign = 'center';
  ctx.fillText('按 R 从检查点满血复活', W/2, H/2 + 28);
  ctx.fillText('当前总分 ' + totalScore, W/2, H/2 + 62);
}
function drawWin() {
  ctx.fillStyle = 'rgba(8,10,24,0.7)'; ctx.fillRect(0, 0, W, H);
  panel(540, 320);
  bigText('🎉 通关！', H/2 - 96, 52, '#ffd166');
  ctx.font = '22px "Segoe UI", sans-serif'; ctx.fillStyle = '#dde3f0'; ctx.textAlign = 'center';
  ctx.fillText('十大关卡制霸 · 暗影史莱姆王已被击败！', W/2, H/2 - 34);
  ctx.fillText('宝石收集 ' + gemsRun + ' 颗', W/2, H/2 - 2);
  bigText('最终总分 ' + totalScore, H/2 + 48, 36, '#7dff9b');
  const best = getBest();
  ctx.font = '17px "Segoe UI", sans-serif'; ctx.fillStyle = '#ffd166';
  ctx.fillText(totalScore >= best ? '🏆 新纪录！' : '最高纪录 ' + best, W/2, H/2 + 84);
  ctx.font = '18px "Segoe UI", sans-serif'; ctx.fillStyle = '#9fb8ff';
  ctx.fillText('按 R 再来一局', W/2, H/2 + 120);
}

// =====================================================================
//  主循环
// =====================================================================
let lastT = 0;
function frame(time) {
  const dt = Math.min(1/30, (time - lastT) / 1000 || 0);
  lastT = time;

  if (state === 'title' && anyKeyPressed) { anyKeyPressed = false; state = 'play'; }
  else if (state === 'clear' && keys[' ']) {
    keys[' '] = false;
    if (level < LEVELS.length - 1) { loadLevel(level + 1); state = 'play'; }
    else { state = 'win'; saveBest(totalScore); }
  }
  anyKeyPressed = false;

  update(dt);
  draw(time);
  requestAnimationFrame(frame);
}
loadLevel(0);
requestAnimationFrame(frame);
</script>
